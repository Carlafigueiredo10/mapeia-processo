version: 2
updates:
  # Atualizações de segurança/versão das dependências npm
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development

  # Atualizações das próprias GitHub Actions usadas nos workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
