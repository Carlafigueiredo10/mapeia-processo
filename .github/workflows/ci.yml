name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Token mínimo: o CI só lê o código.
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Auditoria de dependências
        run: npm audit --omit=dev --audit-level=high
